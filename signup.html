<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - VELOCE MOTORS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body style="height: 100vh; overflow: hidden; display: flex;">
    <div class="noise-overlay"></div>
    <div class="custom-cursor"></div>
    <div class="custom-cursor-ring"><span class="cursor-text"></span></div>
    <div class="page-transition-curtain"></div>

    <a href="index.html" class="brand-logo magnetic-wrap" style="position: absolute; top: 32px; left: 32px; z-index: 10;">VELOCE<span>.</span></a>

    <div style="flex: 1; position: relative; background: var(--color-bg-secondary);">
        <img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c341?auto=format&fit=crop&w=1000&q=80" style="width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7);">
    </div>

    <div style="flex: 1; display: flex; align-items: center; justify-content: center; position: relative;">
        <div style="width: 100%; max-width: 400px; padding: 32px;">
            <h1 class="text-h2" style="margin-bottom: 8px;">Create Account</h1>
            <p style="color: var(--color-text-secondary); margin-bottom: 48px;">Join Veloce Motors to save vehicles and fast-track applications.</p>
            
            <form>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input interactive" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input interactive" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input interactive" required>
                </div>
                <button type="button" onclick="window.location.href='dashboard.html'" class="btn btn-primary magnetic-wrap" style="width: 100%; margin-bottom: 24px;">Create Account</button>
            </form>
            
            <p style="text-align: center; color: var(--color-text-secondary); font-size: 0.875rem;">Already have an account? <a href="login.html" style="color: white; font-weight: 600;">Sign in</a></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
