<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Vehicles - VELOCE MOTORS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .compare-table { width: 100%; border-collapse: collapse; }
        .compare-table th, .compare-table td { padding: 24px; border-bottom: 1px solid var(--border-glass); text-align: center; }
        .compare-table th { position: sticky; top: 80px; background: var(--color-bg-secondary); z-index: 10; border-bottom: 2px solid var(--color-accent); }
        .compare-table td:first-child { text-align: left; font-weight: 600; color: var(--color-text-secondary); }
        .highlight-diff { background: rgba(255, 106, 0, 0.05); }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="custom-cursor"></div>
    <div class="custom-cursor-ring"><span class="cursor-text"></span></div>
    <div class="page-transition-curtain"></div>

    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo magnetic-wrap">VELOCE<span>.</span></a>
            <div class="nav-actions">
                <a href="inventory.html" class="btn btn-secondary magnetic-wrap">Back to Inventory</a>
            </div>
        </div>
    </nav>

    <main id="main-content" style="padding-top: 100px;">
        <section class="section">
            <div class="container">
                <h1 class="text-h2 text-center" style="margin-bottom: 48px;">Compare Vehicles</h1>
                
                <div class="glass" style="border-radius: var(--radius-lg); overflow: auto;">
                    <table class="compare-table">
                        <thead>
                            <tr>
                                <th></th>
                                <th>
                                    <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=400&q=80" style="width: 100%; border-radius: var(--radius-sm); margin-bottom: 16px;">
                                    <h3 class="text-h3">2026 Porsche 911 GT3</h3>
                                    <div class="text-accent text-mono" style="margin-bottom: 16px;">$185,000</div>
                                    <a href="vehicle-detail.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.75rem;">View</a>
                                </th>
                                <th>
                                    <img src="https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&w=400&q=80" style="width: 100%; border-radius: var(--radius-sm); margin-bottom: 16px;">
                                    <h3 class="text-h3">2025 Tesla Model S Plaid</h3>
                                    <div class="text-accent text-mono" style="margin-bottom: 16px;">$108,490</div>
                                    <a href="#" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.75rem;">View</a>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Powertrain</td>
                                <td>Gasoline / 4.0L Flat-6</td>
                                <td class="highlight-diff">Electric / Tri-Motor AWD</td>
                            </tr>
                            <tr>
                                <td>Horsepower</td>
                                <td>502 hp</td>
                                <td class="highlight-diff">1,020 hp</td>
                            </tr>
                            <tr>
                                <td>0-60 MPH</td>
                                <td>3.2 sec</td>
                                <td class="highlight-diff">1.99 sec</td>
                            </tr>
                            <tr>
                                <td>Top Speed</td>
                                <td>197 mph</td>
                                <td>200 mph</td>
                            </tr>
                            <tr>
                                <td>Body Style</td>
                                <td>Coupe</td>
                                <td class="highlight-diff">Sedan</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
